<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Ceiba Restaurant | Naturaleza y Sabor en La Habana</title>
  
  <!-- SEO -->
  <meta name="description" content="La Ceiba Restaurant: experiencia gastronómica única rodeada de naturaleza. Cocina criolla, mariscos frescos y el mejor ambiente tropical de La Habana.">
  <meta name="keywords" content="restaurante La Ceiba, La Habana, comida criolla, mariscos, ambiente natural, jardín, Cuba">
  <meta property="og:title" content="La Ceiba Restaurant | Naturaleza y Sabor">
  <meta property="og:description" content="Descubre la magia de comer bajo una ceiba centenaria">
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { scroll-behavior: smooth; }
    
    :root {
      --ceiba-green: #2D5016;
      --ceiba-light: #4A7C23;
      --ceiba-gold: #D4AF37;
      --ceiba-wood: #8B4513;
      --ceiba-cream: #F5F5DC;
      --ceiba-sand: #F4E4C1;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--ceiba-cream);
    }
    
    .font-display {
      font-family: 'Cormorant Garamond', serif;
    }
    
    /* Custom Scrollbar - madera/natural */
    ::-webkit-scrollbar {
      width: 12px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--ceiba-green), var(--ceiba-wood));
      border-radius: 6px;
      border: 3px solid #f1f1f1;
    }
    
    /* Animaciones naturales */
    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    
    @keyframes float-leaf {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }
    
    @keyframes grow {
      from { transform: scaleY(0); opacity: 0; }
      to { transform: scaleY(1); opacity: 1; }
    }
    
    .animate-sway {
      animation: sway 4s ease-in-out infinite;
      transform-origin: bottom center;
    }
    
    .animate-float-leaf {
      animation: float-leaf 6s ease-in-out infinite;
    }
    
    /* Efectos naturales */
    .wood-texture {
      background-image: repeating-linear-gradient(
        90deg,
        rgba(139, 69, 19, 0.1) 0px,
        transparent 1px,
        transparent 2px,
        rgba(139, 69, 19, 0.1) 3px
      );
    }
    
    .leaf-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q40 20 30 35 Q20 20 30 5' fill='none' stroke='%232D5016' stroke-opacity='0.05' stroke-width='1'/%3E%3C/svg%3E");
    }
    
    .glass-natural {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(45, 80, 22, 0.1);
    }
    
    /* Botón orgánico */
    .btn-organic {
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }
    .btn-organic::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-organic:hover::before {
      left: 100%;
    }
    
    /* Card hover efecto naturaleza */
    .card-nature {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(45, 80, 22, 0.1);
    }
    .card-nature:hover {
      transform: translateY(-8px) rotate(1deg);
      box-shadow: 0 25px 50px -12px rgba(45, 80, 22, 0.25);
    }
    
    /* Texto con efecto dorado */
    .text-gold-gradient {
      background: linear-gradient(135deg, #D4AF37 0%, #F4E4C1 50%, #D4AF37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Separador orgánico */
    .divider-organic {
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--ceiba-green), var(--ceiba-gold), var(--ceiba-green), transparent);
      border-radius: 2px;
    }
    
    /* Input estilo natural */
    .input-nature {
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(45, 80, 22, 0.2);
      transition: all 0.3s ease;
    }
    .input-nature:focus {
      border-color: var(--ceiba-green);
      box-shadow: 0 0 0 4px rgba(45, 80, 22, 0.1);
      outline: none;
    }
    
    /* Toast natural */
    .toast-nature {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: white;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(45, 80, 22, 0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      transform: translateX(400px);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border-left: 4px solid var(--ceiba-green);
    }
    .toast-nature.show {
      transform: translateX(0);
    }
  </style>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ceiba-green': '#2D5016',
            'ceiba-light': '#4A7C23',
            'ceiba-gold': '#D4AF37',
            'ceiba-wood': '#8B4513',
            'ceiba-cream': '#F5F5DC',
            'ceiba-sand': '#F4E4C1',
            'ceiba-dark': '#1a2e0c',
          },
          fontFamily: {
            'display': ['Cormorant Garamond', 'serif'],
            'body': ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-body bg-ceiba-cream text-gray-800 antialiased leaf-pattern">
  <div id="root"></div>

  <script type="text/babel">

    const { motion, AnimatePresence } = window.Motion;
    
    // Iconos personalizados estilo natural

        whatsapp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>,
        instagram: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,

        minus: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
        arrowUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>,
        sun: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,

    };
    
    // Toast Component
    const Toast = ({ message, type, isVisible, onClose }) => {
      useEffect(() => {
        if (isVisible) {
          const timer = setTimeout(onClose, 3000);
          return () => clearTimeout(timer);
        }
      }, [isVisible, onClose]);
      
      return (
        <div className={`toast-nature ${isVisible ? 'show' : ''}`}>
          <div className="w-10 h-10 rounded-full bg-ceiba-green flex items-center justify-center">
            <Icon name={type === 'success' ? 'check' : 'leaf'} size={20} className="text-white" />
          </div>
          <span className="font-medium text-gray-800 font-body">{message}</span>
        </div>
      );
    };
    
    // Header Component - Estilo natural/orgánico
    const Header = ({ cartCount, onCartClick, onReservaClick, isDark, toggleTheme }) => {
      const [isScrolled, setIsScrolled] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);
      
      const navItems = [
        { label: 'Inicio', href: '#inicio' },
        { label: 'Nosotros', href: '#nosotros' },
        { label: 'Menú', href: '#menu' },
        { label: 'Galería', href: '#galeria' },
        { label: 'Contacto', href: '#contacto' },
      ];
      
      return (
        <motion.header 
          initial={{ y: -100 }}
          animate={{ y: 0 }}
          className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${
            isScrolled ? 'glass-natural shadow-lg py-3' : 'bg-transparent py-6'
          }`}
        >
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
            {/* Logo con icono de árbol */}
            <motion.a 
              href="#inicio"
              className="flex items-center gap-3"
              whileHover={{ scale: 1.05 }}
            >
              <div className={`w-12 h-12 rounded-full flex items-center justify-center ${isScrolled ? 'bg-ceiba-green' : 'bg-white/20 backdrop-blur-sm'}`}>
                <Icon name="tree" size={28} className={isScrolled ? 'text-ceiba-gold' : 'text-white'} />
              </div>
              <div>
                <span className={`text-2xl md:text-3xl font-display font-bold tracking-tight block leading-none ${
                  isScrolled ? 'text-ceiba-green' : 'text-white'
                }`}>
                  La Ceiba
                </span>
                <span className={`text-xs tracking-[0.3em] uppercase ${isScrolled ? 'text-ceiba-wood' : 'text-white/80'}`}>
                  Restaurant
                </span>
              </div>
            </motion.a>
            
            {/* Desktop Nav */}
            <nav className="hidden md:flex items-center gap-8">
              {navItems.map((item) => (
                <a
                  key={item.label}
                  href={item.href}
                  className={`font-medium transition-all hover:text-ceiba-gold relative group ${
                    isScrolled ? 'text-gray-700' : 'text-white/90 hover:text-white'
                  }`}
                >
                  {item.label}
                  <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-ceiba-gold transition-all group-hover:w-full" />
                </a>
              ))}
            </nav>
            
            <div className="flex items-center gap-4">
              <button
                onClick={toggleTheme}
                className={`p-2 rounded-full transition-all ${isScrolled ? 'hover:bg-ceiba-green/10 text-gray-700' : 'hover:bg-white/10 text-white'}`}
              >
                <Icon name={isDark ? 'sun' : 'moon'} size={20} />
              </button>
              
              <button
                onClick={onCartClick}
                className={`relative p-2 rounded-full transition-all ${isScrolled ? 'hover:bg-ceiba-green/10 text-gray-700' : 'hover:bg-white/10 text-white'}`}
              >
                <Icon name="shoppingBag" size={22} />
                {cartCount > 0 && (
                  <span className="absolute -top-1 -right-1 w-5 h-5 bg-ceiba-gold text-white text-xs font-bold rounded-full flex items-center justify-center animate-pulse">
                    {cartCount}
                  </span>
                )}
              </button>
              
              <button
                onClick={onReservaClick}
                className="hidden md:flex items-center gap-2 bg-ceiba-green hover:bg-ceiba-light text-white px-6 py-3 rounded-full font-semibold transition-all shadow-lg hover:shadow-ceiba-green/30 btn-organic"
              >
                <Icon name="phone" size={18} />
                Reservar
              </button>

      }, []);
      
      const scrollToTop = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      return (
        <AnimatePresence>
          {isVisible && (
            <motion.button
              initial={{ opacity: 0, scale: 0 }}
              animate={{ opacity: 1, scale: 1 }}
              exit={{ opacity: 0, scale: 0 }}
              onClick={scrollToTop}
              className="fixed bottom-8 right-8 z-40 w-14 h-14 bg-ceiba-green text-white rounded-full shadow-lg hover:bg-ceiba-light transition-colors flex items-center justify-center"
            >
              <Icon name="arrowUp" size={24} />
            </motion.button>
          )}
        </AnimatePresence>
      );
    };
    
    // Main App Component
    const App = () => {
      const [cart, setCart] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isReservaOpen, setIsReservaOpen] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [isDark, setIsDark] = useState(false);
      
      const showToast = useCallback((message, type = 'success') => {
        setToast({ show: true, message, type });
      }, []);
      
      const hideToast = useCallback(() => {
        setToast({ show: false, message: '', type: 'success' });
      }, []);
      
      const addToCart = (item) => {
        setCart(prev => {
          const existing = prev.find(i => i.id === item.id);
          if (existing) {
            return prev.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
          }
          return [...prev, { ...item, quantity: 1 }];
        });
        showToast(`${item.name} añadido a tu canasta 🌿`);
      };
      
      const updateQuantity = (id, delta) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const newQty = Math.max(1, item.quantity + delta);
            return { ...item, quantity: newQty };
          }
          return item;
        }));
      };
      
      const removeFromCart = (id) => {
        setCart(prev => prev.filter(item => item.id !== id));
        showToast('Producto eliminado', 'info');
      };
      
      const handleCheckout = () => {
        const numero = '5372605078';
        let mensaje = `🌳 *Nuevo Pedido - La Ceiba Restaurant*\n\n`;
        cart.forEach(item => {
          mensaje += `• ${item.name} x${item.quantity} - ${item.price * item.quantity} CUP\n`;
        });
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        mensaje += `\n*Total:* ${total} CUP\n\nGracias por elegirnos! 🌿`;
        
        window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        setCart([]);
        setIsCartOpen(false);
        showToast('Redirigiendo a WhatsApp...');
      };
      
      const toggleTheme = () => {
        setIsDark(!isDark);
        document.body.style.backgroundColor = isDark ? '#F5F5DC' : '#1a2e0c';
        document.body.style.color = isDark ? '#1f2937' : '#f3f4f6';
      };
      
      return (
        <div className={`${isDark ? 'dark' : ''}`}>
          <Header 
            cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)}
            onCartClick={() => setIsCartOpen(true)}
            onReservaClick={() => setIsReservaOpen(true)}
            isDark={isDark}
            toggleTheme={toggleTheme}
          />
          
          <main>
            <Hero onReservaClick={() => setIsReservaOpen(true)} />
            <AboutSection />
            <MenuSection addToCart={addToCart} />
            <Gallery />
            <Testimonials />
            <Location />
          </main>
          
          <Footer />
          
          <CartSidebar 
            isOpen={isCartOpen}
            onClose={() => setIsCartOpen(false)}
            cart={cart}
            updateQuantity={updateQuantity}
            removeFromCart={removeFromCart}
            onCheckout={handleCheckout}
          />
          
          <ReservationModal 
            isOpen={isReservaOpen}
            onClose={() => setIsReservaOpen(false)}
            showToast={showToast}
          />
          
          <Toast 
            message={toast.message}
            type={toast.type}
            isVisible={toast.show}
            onClose={hideToast}
          />
          
          <BackToTop />
          
          {/* Floating WhatsApp Button */}
          <motion.a
            href="https://wa.me/5372605078"
            target="_blank"
            initial={{ scale: 0 }}
            animate={{ scale: 1 }}
            whileHover={{ scale: 1.1 }}
            className="fixed bottom-8 left-8 z-40 w-16 h-16 bg-green-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:shadow-green-500/50 transition-shadow"
          >
            <Icon name="whatsapp" size={32} />
          </motion.a>
        </div>
      );
    };
    
    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
